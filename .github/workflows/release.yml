# Release build — builds installers for all three platforms and uploads them
# together with the auto-update metadata (latest.yml / latest-linux.yml /
# latest-mac.yml) to GitHub Releases. Runs only on a version tag `v*`.
#
# The regular CI job (lint/typecheck/build/test) stays in ci.yml and is
# untouched by this workflow.
#
# ABI note: `pnpm install` builds the native modules (better-sqlite3,
# @napi-rs/keyring) for system Node. electron-builder rebuilds them at packaging
# time via `npmRebuild` for Electron's ABI (electron-builder.yml). The
# node-linker=hoisted layout (.npmrc) ensures electron-builder finds them in the
# monorepo.

name: Release

on:
  push:
    tags:
      - 'v*'

# electron-builder creates a (draft) GitHub release for the tag and uploads the
# artifacts — for that the GITHUB_TOKEN needs write access to contents.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # uses packageManager (pnpm@11) from package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build all packages + renderer/main/preload (topological order).
      - run: pnpm build

      # Build the targets configured for the current OS (Linux: AppImage+deb,
      # Windows: nsis, macOS: dmg) and publish them to GitHub Releases.
      # `--publish always` uploads artifacts + update metadata.
      - name: Package + publish
        run: pnpm --filter @webaibuilder/desktop exec electron-builder --publish always
        env:
          # electron-builder reads GH_TOKEN for the GitHub provider.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- TODO(user): add code-signing secrets --------------------------
          # Windows (Authenticode / Azure Trusted Signing):
          #   CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          #   CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          # macOS (signing + notarization):
          #   CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          #   CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          #   APPLE_ID: ${{ secrets.APPLE_ID }}
          #   APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Without these secrets the builds are unsigned (Linux is fine;
          # Windows/macOS show security warnings or Gatekeeper blocks them).
          # ------------------------------------------------------------------
