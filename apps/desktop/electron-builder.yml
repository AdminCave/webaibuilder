# electron-builder configuration — Web AI Builder (M5, packaging + auto-update)
#
# Read by `electron-builder` (apps/desktop). electron-vite first builds
# main/preload/renderer into `out/`; electron-builder packages `out/` + the
# production node_modules (including the native modules better-sqlite3 and
# @napi-rs/keyring) and uploads the auto-update metadata (`latest.yml` etc.) to
# GitHub Releases.
#
# --- pnpm monorepo note (IMPORTANT) ---------------------------------------
# electron-builder expects a flat node_modules to reliably find the (transitive)
# production dependencies of the bundled workspace packages and rebuild the
# native modules. By default pnpm uses an isolated linker (symlinks in .pnpm)
# that electron-builder's file collector does not fully traverse
# (electron-userland/electron-builder#6389). That's why `pnpm-workspace.yaml`
# sets `node-linker: hoisted` — so the runtime deps sit flat in node_modules and
# are collected/rebuilt correctly. See SETUP.md.
# --------------------------------------------------------------------------

appId: dev.admincave.webaibuilder
productName: Web AI Builder
copyright: © 2026 AdminCave

directories:
  # Installer/artifacts land here (in .gitignore).
  output: dist
  # Icons/installer assets. electron-builder automatically finds
  # build/icon.png (Linux, 1024²), build/icon.ico (Windows, 7 resolutions)
  # and build/icon.icns (macOS, iconutil format) here. Derived from the
  # AdminCave design system (white mark on black), see build/README.md.
  buildResources: build

# App files: only the built `out/` + the manifests. The production
# node_modules (better-sqlite3, @napi-rs/keyring, chokidar, ws, simple-git,
# ssh2, basic-ftp, ...) are added by electron-builder itself based on the
# dependency tree; sources/configs/tests are deliberately not packaged.
files:
  - out/**
  - package.json
  - '!**/*.map'
  - '!**/*.tsbuildinfo'

# Starter templates must ship with the app (PLAN M1). The runtime code reads
# them from `process.resourcesPath/templates` (src/main/paths.ts) — so copy them
# there as extraResources rather than bundling them into the asar.
extraResources:
  - from: resources/templates
    to: templates
    filter:
      - '**/*'

# Do NOT let electron-builder rebuild native modules. Reason: electron-builder's
# install-app-deps would build ALL native modules (including the optional
# ssh2 dependency `cpu-features`, which has a node-gyp bug that aborts the
# build). Instead the `package` script rebuilds ONLY better-sqlite3 for
# Electron's ABI beforehand (scripts/rebuild-native.mjs); @napi-rs/keyring is
# N-API and needs no rebuild. electron-builder bundles the already-matching
# binaries unchanged. (`pnpm -r test` runs under the node ABI — before tests run
# `pnpm --filter @webaibuilder/desktop rebuild:node`.)
npmRebuild: false
nodeGypRebuild: false
buildDependenciesFromSource: false

# Auto-update feed (electron-updater reads the generated app-update.yml).
publish:
  provider: github
  owner: AdminCave
  repo: webaibuilder

# --- Linux: AppImage + deb (core target audience, PLAN §7 risk 6) ---
linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: AdminCave <mail@kevin-stenzel.de>
  synopsis: Build websites via AI chat and deploy them to classic web hosting.
  description: >-
    Desktop client for building websites via AI chat and deploying them to
    classic web hosting at the push of a button — including rollback.

# --- Windows: NSIS installer ---
win:
  target:
    - nsis
# TODO(user): Code signing (win.certificateFile/-Password or Azure Trusted
# Signing) — add secrets in CI, see .github/workflows/release.yml.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

# --- macOS: dmg (notarization TODO) ---
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
# TODO(user): Signing + notarization (mac.notarize, APPLE_ID/-Team/-Password
# or API key) for Gatekeeper-compatible builds. Without these, dmg builds run
# unsigned only.

dmg:
  writeUpdateInfo: true
