# electron-builder-Konfiguration — Web AI Builder (M5, Packaging + Auto-Update)
#
# Wird von `electron-builder` (apps/desktop) gelesen. electron-vite baut zuvor
# main/preload/renderer nach `out/`; electron-builder verpackt `out/` + die
# Produktions-node_modules (inkl. der nativen Module better-sqlite3 und
# @napi-rs/keyring) und lädt die Auto-Update-Metadaten (`latest.yml` etc.) zu
# GitHub Releases hoch.
#
# --- pnpm-Monorepo-Hinweis (WICHTIG) --------------------------------------
# electron-builder erwartet ein flaches node_modules, um die (transitiven)
# Produktions-Abhängigkeiten der gebundelten Workspace-Pakete zuverlässig zu
# finden und die nativen Module zu rebuilden. pnpm nutzt standardmäßig einen
# isolierten Linker (Symlinks in .pnpm), den electron-builders Dateisammler
# nicht vollständig traversiert (electron-userland/electron-builder#6389).
# Deshalb setzt `pnpm-workspace.yaml` `node-linker: hoisted` — damit liegen die
# Laufzeit-Deps flach in node_modules und werden korrekt eingesammelt/rebuildet.
# Siehe SETUP.md.
# --------------------------------------------------------------------------

appId: dev.admincave.webaibuilder
productName: Web AI Builder
copyright: © 2026 AdminCave

directories:
  # Installer/Artefakte landen hier (in .gitignore).
  output: dist
  # Icons/Installer-Assets. electron-builder findet hier automatisch
  # build/icon.png (Linux, 1024²), build/icon.ico (Windows, 7 Auflösungen)
  # und build/icon.icns (macOS, iconutil-Format). Abgeleitet aus dem
  # AdminCave-Design-System (weiße Marke auf Schwarz), siehe build/README.md.
  buildResources: build

# App-Dateien: nur das gebaute `out/` + die Manifeste. Die Produktions-
# node_modules (better-sqlite3, @napi-rs/keyring, chokidar, ws, simple-git,
# ssh2, basic-ftp, ...) fügt electron-builder anhand des Dependency-Baums selbst
# hinzu; Quellen/Configs/Tests werden bewusst nicht mitverpackt.
files:
  - out/**
  - package.json
  - '!**/*.map'
  - '!**/*.tsbuildinfo'

# Starter-Vorlagen müssen mit der App ausgeliefert werden (PLAN M1). Der
# Laufzeit-Code liest sie aus `process.resourcesPath/templates`
# (src/main/paths.ts) — daher als extraResources dorthin kopieren, nicht ins
# asar bundeln.
extraResources:
  - from: resources/templates
    to: templates
    filter:
      - '**/*'

# Native Module NICHT von electron-builder neu bauen. Grund: electron-builders
# install-app-deps würde ALLE nativen Module bauen (auch die optionale
# ssh2-Abhängigkeit `cpu-features`, die einen node-gyp-Bug hat und den Build
# abbricht). Stattdessen baut das `package`-Skript vorab NUR better-sqlite3 für
# Electrons ABI (scripts/rebuild-native.mjs); @napi-rs/keyring ist N-API und
# braucht keinen Rebuild. electron-builder bündelt die bereits passenden
# Binärdateien unverändert. (`pnpm -r test` läuft unter node-ABI — vor Tests
# `pnpm --filter @webaibuilder/desktop rebuild:node`.)
npmRebuild: false
nodeGypRebuild: false
buildDependenciesFromSource: false

# Auto-Update-Feed (electron-updater liest die generierte app-update.yml).
publish:
  provider: github
  owner: AdminCave
  repo: webaibuilder

# --- Linux: AppImage + deb (Kern-Zielgruppe, PLAN §7 Risiko 6) ---
linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: AdminCave <mail@kevin-stenzel.de>
  synopsis: Webseiten per KI-Chat bauen und auf klassischen Webspace deployen.
  description: >-
    Desktop-Client, mit dem du per KI-Chat Webseiten erstellst und per
    Knopfdruck auf klassischen Webspace deployst — inklusive Rollback.

# --- Windows: NSIS-Installer ---
win:
  target:
    - nsis
# TODO(user): Code-Signing (win.certificateFile/-Password bzw. Azure Trusted
# Signing) — Secrets in CI ergänzen, siehe .github/workflows/release.yml.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

# --- macOS: dmg (Notarisierung TODO) ---
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
# TODO(user): Signierung + Notarisierung (mac.notarize, APPLE_ID/-Team/-Password
# bzw. API-Key) für Gatekeeper-taugliche Builds. Ohne diese laufen dmg-Builds
# nur unsigniert.

dmg:
  writeUpdateInfo: true
