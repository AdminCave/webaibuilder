packages:
  - apps/*
  - packages/*

# Flat node_modules (npm-like layout). This lets electron-builder reliably find
# the (transitive) production deps of the bundled workspace packages and rebuild
# native modules correctly for packaging (electron-builder + pnpm, see
# electron-userland/electron-builder#6389 and SETUP.md). ABI-neutral: `pnpm install`
# still builds for system Node, `pnpm -r test` stays green. (In pnpm ≥10.6
# node-linker belongs here, not in .npmrc.)
nodeLinker: hoisted

# pnpm blocks postinstall scripts by default; Electron needs its own
# (binary download), esbuild fetches its native binary.
allowBuilds:
  better-sqlite3: true
  cpu-features: false
  dtrace-provider: false
  electron: true
  electron-winstaller: false
  esbuild: true
  ssh2: true
